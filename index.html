<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SylvaGIS - Mekansal Analiz Platformu</title>
    <style>
        /* Modern Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #121212; color: #ffffff; }
        
        /* Navbar (Üst Bar) */
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #1e1e1e; padding: 15px 25px; border-bottom: 2px solid #00ffcc; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 1000; }
        .logo-container { display: flex; align-items: center; gap: 10px; font-size: 1.8rem; font-weight: bold; color: #00ffcc; }
        .nav-buttons { display: flex; gap: 15px; }
        .nav-btn { background-color: #2c2c2c; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; color: #ffffff; transition: 0.3s; }
        .nav-btn:hover { background-color: #00ffcc; color: #121212; border-color: #00ffcc; }

        /* Ana İçerik Alanı */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sol Panel (Kontrol Merkezi) */
        .sidebar { width: 320px; background-color: #1e1e1e; border-right: 1px solid #333; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .sidebar h2 { font-size: 1.2rem; color: #00ffcc; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 5px; }
        
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-size: 0.9rem; font-weight: bold; color: #bbb; }
        .control-group input, .control-group select { padding: 10px; border: 1px solid #444; border-radius: 5px; background-color: #2c2c2c; color: white; }
        
        .upload-btn { background-color: #e67e22; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .upload-btn:hover { background-color: #d35400; }

        .action-btn { background-color: #00ffcc; color: #121212; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1.1rem; }
        .action-btn:hover { background-color: #00ccaa; }

        /* Harita Alanı (Orta/Sağ Tuval) */
        .map-container { flex: 1; background-color: #2a2a2a; position: relative; display: flex; align-items: center; justify-content: center; }
        .map-placeholder { text-align: center; color: #777; }
        .map-placeholder h1 { font-size: 4rem; color: #444; margin-bottom: 10px; }
        
        /* Kartografik Çıktı Butonu (Sağ Alt) */
        .print-btn { position: absolute; bottom: 30px; right: 30px; background-color: #1e1e1e; border: 2px solid #00ffcc; color: #00ffcc; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: 0.3s; }
        .print-btn:hover { background-color: #00ffcc; color: #1e1e1e; }
    </style>
</head>
<body>

    <!-- Üst Bar -->
    <div class="navbar">
        <div class="logo-container">
            <!-- Beyaz arka planlı logon ileride buraya eklenecek -->
            🌲 SylvaGIS
        </div>
        <div class="nav-buttons">
            <button class="nav-btn">❓ Rehber</button>
            <button class="nav-btn">🌐 Dil: TR</button>
            <button class="nav-btn">👤 Giriş Yap</button>
        </div>
    </div>

    <!-- Ana Ekran -->
    <div class="main-container">
        
        <!-- Sol Panel -->
        <div class="sidebar">
            <h2>Kontrol Merkezi</h2>
            
            <button class="upload-btn">📂 KML / Sınır Yükle</button>

            <div class="control-group">
                <label>Uydu Verisi</label>
                <select>
                    <option>Landsat 9 (Level-2)</option>
                    <option>Sentinel-2 (MSI)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Tarih Seçimi</label>
                <input type="date">
            </div>

            <div class="control-group">
                <label>Bulut Toleransı (%)</label>
                <input type="range" min="0" max="100" value="15">
            </div>

            <h2>Analiz Modülü</h2>
            <div class="control-group">
                <select>
                    <option>NDVI (Bitki Örtüsü İndeksi)</option>
                    <option>LST (Yüzey Sıcaklığı)</option>
                    <option>NDWI (Su İndeksi)</option>
                    <option>SMI (Toprak Nemi İndeksi)</option>
                </select>
            </div>
            
            <button class="action-btn">🚀 Analizi Başlat</button>
        </div>

        <!-- Harita Alanı -->
        <div class="map-container" id="map">
            <div class="map-placeholder">
                <h1>🗺️</h1>
                <p>İnteraktif Harita Tuvali Yükleniyor...</p>
            </div>
            <button class="print-btn">📥 Görsel Çıktı Al (300 DPI)</button>
        </div>

    </div>

</body>
</html>
