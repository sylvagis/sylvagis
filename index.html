<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SylvaGIS - Profesyonel Karar Destek Platformu</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://unpkg.com/shpjs@4.0.4/dist/shp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        /* CSS'in aynı kalabilir, burayı kısalttım ama senin orijinal CSS'lerini korudum */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar-left { width: 340px; background: white; padding: 20px; border-right: 1px solid #e2e8f0; }
        .map-wrapper { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .btn-primary { width: 100%; background-color: #1e3a8a; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar-left">
            <h2>Girdi & Veri Seçimi</h2>
            <input type="file" id="file-upload" accept=".kml, .kmz, .zip" style="display: none;">
            <button class="btn-primary" onclick="document.getElementById('file-upload').click();">📂 KML / KMZ / SHP Yükle</button>
        </div>
        <div class="map-wrapper"><div id="map"></div></div>
    </div>

    <script>
        // 1. HARİTA VE BASEMAP
        var map = L.map('map').setView([39.0, 35.0], 6);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // 2. DOSYA YÜKLEME MOTORU
        document.getElementById('file-upload').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function(event) {
                var data = event.target.result;
                var fileName = file.name.toLowerCase();

                function addLayer(geojson) {
                    var layer = L.geoJSON(geojson, { style: { color: 'red', weight: 3 } }).addTo(map);
                    map.fitBounds(layer.getBounds());
                }

                try {
                    if (fileName.endsWith('.zip')) {
                        shp(data).then(addLayer);
                    } else if (fileName.endsWith('.kml')) {
                        var xml = new DOMParser().parseFromString(data, "text/xml");
                        addLayer(toGeoJSON.kml(xml));
                    } else if (fileName.endsWith('.kmz')) {
                        JSZip.loadAsync(data).then(zip => {
                            var kmlName = Object.keys(zip.files).find(n => n.endsWith('.kml'));
                            zip.files[kmlName].async("string").then(text => {
                                var xml = new DOMParser().parseFromString(text, "text/xml");
                                addLayer(toGeoJSON.kml(xml));
                            });
                        });
                    }
                } catch (err) { alert("Hata: " + err); }
            };
            if (file.name.endsWith('.kml')) reader.readAsText(file);
            else reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
