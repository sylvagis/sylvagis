<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SylvaGIS - Profesyonel Karar Destek Platformu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <style>
        /* [MEVCUT STİLLERİN AYNEN KALDI, SADECE AŞAĞIDAKİLER GÜNCELLENDİ] */
        .btn-primary { padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; }
        .btn-tool { padding: 5px 10px; font-size: 0.8rem; }
        
        /* Renk Kutucukları ve Bar Düzeni */
        .quick-colors { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; margin-top: 5px; }
        .color-swatch { width: 20px; height: 20px; border-radius: 2px; cursor: pointer; border: 1px solid #cbd5e1; }
        .color-selector-wrapper { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
        
        /* Metin Ekle Kutusu */
        .text-add-btn { width: 100%; padding: 6px; border: 1px solid #1e3a8a; background: #f8fafc; border-radius: 4px; cursor: pointer; font-size: 0.85rem; text-align: center; }
        
        /* Hesaplama Bilgisi */
        .geometry-info { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="sidebar-left panel">
            <h2>Girdi & Çizim Araçları</h2>
            <button class="btn-primary" style="width: 100%; margin-bottom: 10px;">📂 KML / SHP Yükle</button>
            <div class="tool-row">
                <button class="btn-tool" id="btn-polygon">⬠ Poligon</button>
                <button class="btn-tool" id="btn-rectangle">▭ Dikdörtgen</button>
                <button class="btn-tool btn-danger" id="btn-clear">❌</button>
            </div>

            <div class="geometry-info" id="geom-container">
                <div id="geom-details">Alan: 0 km² | Çevre: 0 km</div>
            </div>

            <button class="btn-primary" style="width: 100%; margin-top: 10px;">🚀 Analizi Çalıştır</button>
        </div>

        <div class="sidebar-right panel">
            <h2>Kartografya</h2>
            
            <h3>Çıktı Araçları</h3>
            <div class="text-add-btn" id="add-text">📝 Metin Ekle</div>

            <div class="control-group">
                <label>Renk ve Semboloji</label>
                <div class="quick-colors">
                    <div class="color-swatch" style="background: #000;"></div>
                    <div class="color-swatch" style="background: #f00;"></div>
                    <div class="color-swatch" style="background: #0f0;"></div>
                </div>
                <div class="color-selector-wrapper">
                    <select style="flex:1; padding:4px;">
                        <option>Açık-Koyu Siyah</option>
                        <option>Kırmızı-Yeşil (NDVI)</option>
                    </select>
                </div>
            </div>
            </div>
    </div>

    <script>
        // Harita ve Turf.js entegrasyonu
        var map = L.map('map', { zoomControl: false }).setView([39.0, 35.0], 6);
        // ... (Harita katmanları ve diğer fonksiyonların burada kalacak)

        // Hesaplama Fonksiyonu (Ahmet, burayı mevcut kodunun içine ekle)
        function updateArea(layer) {
            var geojson = layer.toGeoJSON();
            var area = turf.area(geojson) / 1000000;
            var perimeter = turf.length(geojson, {units: 'kilometers'});
            document.getElementById('geom-details').innerText = 
                `Alan: ${area.toFixed(2)} km² | Çevre: ${perimeter.toFixed(2)} km`;
        }
    </script>
</body>
</html>
